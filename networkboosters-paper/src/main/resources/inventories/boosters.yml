name:
  default: "<dark_gray>Boosters <gray>(%page%/%max-page%)"
  locales:
    es: "<dark_gray>Potenciadores <gray>(%page%/%max-page%)"
    en: "<dark_gray>Boosters <gray>(%page%/%max-page%)"
size: 54
patterns:
  - networkboosters-pagination

items:
  summary:
    type: NETWORKBOOSTERS_SUMMARY
    slot: 4
    item:
      material: VAULT
      name:
        default: "<aqua><bold>Your Boosters"
        locales:
          es: "<aqua><bold>Tus Potenciadores"
          en: "<aqua><bold>Your Boosters"
      lore:
        default:
          - "<gray>Inventory: <white>%owned_total%</white>/<white>%capacity%</white>"
          - "<gray>Active: <white>%active_count%</white>"
          - "<gray>Queue: <white>%queue_count%</white>"
          - "<gray>Claims: <white>%claims_count%</white>"
        locales:
          es:
            - "<gray>Inventario: <white>%owned_total%</white>/<white>%capacity%</white>"
            - "<gray>Activos: <white>%active_count%</white>"
            - "<gray>Cola: <white>%queue_count%</white>"
            - "<gray>Recompensas: <white>%claims_count%</white>"
          en:
            - "<gray>Inventory: <white>%owned_total%</white>/<white>%capacity%</white>"
            - "<gray>Active: <white>%active_count%</white>"
            - "<gray>Queue: <white>%queue_count%</white>"
            - "<gray>Claims: <white>%claims_count%</white>"

  filter:
    type: NETWORKBOOSTERS_FILTER
    slot: 45
    item:
      material: ECHO_SHARD
      name:
        default: "<aqua><bold>Filter"
        locales:
          es: "<aqua><bold>Filtro"
          en: "<aqua><bold>Filter"
      lore:
        default:
          - "%filter_all_color%%filter_all_marker%All"
          - "%filter_active_color%%filter_active_marker%Active"
          - "%filter_current_context_color%%filter_current_context_marker%Current context"
          - "%filter_points_color%%filter_points_marker%Points"
          - "%filter_locked_color%%filter_locked_marker%Locked"
          - "%filter_transferable_color%%filter_transferable_marker%Transferable"
          - ""
          - "<yellow>Click to change."
        locales:
          es:
            - "%filter_all_color%%filter_all_marker%Todos"
            - "%filter_active_color%%filter_active_marker%Activos"
            - "%filter_current_context_color%%filter_current_context_marker%Contexto actual"
            - "%filter_points_color%%filter_points_marker%Points"
            - "%filter_locked_color%%filter_locked_marker%Bloqueados"
            - "%filter_transferable_color%%filter_transferable_marker%Transferibles"
            - ""
            - "<yellow>Click para cambiar."
          en:
            - "%filter_all_color%%filter_all_marker%All"
            - "%filter_active_color%%filter_active_marker%Active"
            - "%filter_current_context_color%%filter_current_context_marker%Current context"
            - "%filter_points_color%%filter_points_marker%Points"
            - "%filter_locked_color%%filter_locked_marker%Locked"
            - "%filter_transferable_color%%filter_transferable_marker%Transferable"
            - ""
            - "<yellow>Click to change."

  sort:
    type: NETWORKBOOSTERS_SORT
    slot: 46
    item:
      material: AMETHYST_SHARD
      name:
        default: "<aqua><bold>Sort"
        locales:
          es: "<aqua><bold>Orden"
          en: "<aqua><bold>Sort"
      lore:
        default:
          - "%sort_recommended_color%%sort_recommended_marker%Recommended"
          - "%sort_quantity_color%%sort_quantity_marker%Quantity"
          - ""
          - "<yellow>Click to change."
        locales:
          es:
            - "%sort_recommended_color%%sort_recommended_marker%Recomendado"
            - "%sort_quantity_color%%sort_quantity_marker%Cantidad"
            - ""
            - "<yellow>Click para cambiar."
          en:
            - "%sort_recommended_color%%sort_recommended_marker%Recommended"
            - "%sort_quantity_color%%sort_quantity_marker%Quantity"
            - ""
            - "<yellow>Click to change."

  claims:
    type: NETWORKBOOSTERS_OPEN_CLAIMS
    slot: 53
    item:
      material: VAULT
      name:
        default: "<gold><bold>Pending Claims"
        locales:
          es: "<gold><bold>Recompensas Pendientes"
          en: "<gold><bold>Pending Claims"
      lore:
        default:
          - "<gray>Pending: <white>%claims_count%</white>"
          - "<yellow>Click to open."
        locales:
          es:
            - "<gray>Pendientes: <white>%claims_count%</white>"
            - "<yellow>Click para abrir."
          en:
            - "<gray>Pending: <white>%claims_count%</white>"
            - "<yellow>Click to open."

  owned-boosters:
    type: NETWORKBOOSTERS_OWNED_BOOSTERS
    slots:
      - 10-16
      - 19-25
      - 28-34
    item:
      material: TRIAL_KEY
      name:
        default: "<aqua><bold>%booster_id%"
        locales:
          es: "<aqua><bold>%booster_id%"
          en: "<aqua><bold>%booster_id%"
      lore:
        default:
          - "<gray>Amount: <white>%amount%</white>"
          - "<gray>Multiplier: <aqua>x%multiplier%</aqua>"
          - "<gray>Duration: <white>%duration%</white>"
          - "<gray>State: <white>%state%</white>"
          - ""
          - "<yellow>Left click to activate."
          - "<yellow>Right click to transfer."
        locales:
          es:
            - "<gray>Cantidad: <white>%amount%</white>"
            - "<gray>Multiplicador: <aqua>x%multiplier%</aqua>"
            - "<gray>Duración: <white>%duration%</white>"
            - "<gray>Estado: <white>%state%</white>"
            - ""
            - "<yellow>Click izquierdo para activar."
            - "<yellow>Click derecho para transferir."
          en:
            - "<gray>Amount: <white>%amount%</white>"
            - "<gray>Multiplier: <aqua>x%multiplier%</aqua>"
            - "<gray>Duration: <white>%duration%</white>"
            - "<gray>State: <white>%state%</white>"
            - ""
            - "<yellow>Left click to activate."
            - "<yellow>Right click to transfer."

  empty-owned:
    type: NETWORKBOOSTERS_EMPTY_OWNED
    slot: 22
    item:
      material: GRAY_DYE
      name:
        default: "<yellow><bold>No boosters"
        locales:
          es: "<yellow><bold>No tenés potenciadores"
          en: "<yellow><bold>No boosters"
      lore:
        default:
          - "<gray>Your booster inventory is empty."
          - "<dark_gray>Earn boosters from rewards, events, and network content."
        locales:
          es:
            - "<gray>Tu inventario de potenciadores está vacío."
            - "<dark_gray>Conseguilos mediante recompensas, eventos y contenido de la network."
          en:
            - "<gray>Your booster inventory is empty."
            - "<dark_gray>Earn boosters from rewards, events, and network content."

  empty-filter:
    type: NETWORKBOOSTERS_EMPTY_FILTER
    slot: 22
    item:
      material: HOPPER
      name:
        default: "<yellow><bold>No results"
        locales:
          es: "<yellow><bold>No hay resultados"
          en: "<yellow><bold>No results"
      lore:
        default:
          - "<gray>No booster matches the selected filter."
          - "<yellow>Change the filter to see more boosters."
        locales:
          es:
            - "<gray>Ningún potenciador coincide con el filtro seleccionado."
            - "<yellow>Cambiá el filtro para ver más potenciadores."
          en:
            - "<gray>No booster matches the selected filter."
            - "<yellow>Change the filter to see more boosters."
