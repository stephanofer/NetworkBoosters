    slots:
      - 6-8
      - 17
      - 24-26
    item:
      material: RED_BUNDLE
      hide-additional-tooltip: true
      name:
        default: "<red><bold>Cancel"
        locales:
          es: "<red><bold>Cancelar"
          en: "<red><bold>Cancel"
