config-version: 2

server:
  id: "development-01"
  game-id: "development"

storage:
  host: "127.0.0.1"
  port: 3306
  database: "hera_network"
  username: "networkboosters"
  password: ""
  table-prefix: "network_booster_"
  pool:
    maximum-size: 10
    minimum-idle: 2
    connection-timeout: 10s
    validation-timeout: 5s
    shutdown-timeout: 10s

redis:
  enabled: true
  host: "127.0.0.1"
  port: 6379
  database: 0
  username: ""
  password: ""
  ssl: false
  verify-peer: true
  environment: "development"
  key-prefix: "hera"
  command-timeout: 3s
  connect-timeout: 3s
  shutdown-timeout: 5s
  auto-reconnect: true
  reconciliation-interval: 30s
  degraded-reconciliation-interval: 5s

limits:
  maximum-multiplier: 10.0

activation:
  maximum-total-duration: 7d
  maximum-queued-entries: 20
  expiry-check-interval: 1s
  expiry-batch-size: 100
  expiry-warnings:
    - 5m
    - 1m
    - 10s

inventory-limits:
  fallback: 30
  tiers:
    phantom:
      permission: "networkboosters.capacity.phantom"
      maximum: 60
      priority: 100

    legend:
      permission: "networkboosters.capacity.legend"
      maximum: 100
      priority: 200

scope-display:
  games:
    development: "Development"

localization:
  fallback-language: en
  console-language: en

commands:
  root: boosters
  aliases:
    - booster
    - boosts

placeholderapi:
  enabled: true
