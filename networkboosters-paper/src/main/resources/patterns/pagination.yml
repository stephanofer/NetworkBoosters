          es: "<aqua><bold>Página Siguiente"
          en: "<aqua><bold>Next Page"
      lore:
        default:
          - "<gray>Go forward one page."
        locales:
          es:
            - "<gray>Avanzá una página."
          en:
            - "<gray>Go forward one page."
    else:
      item:
        material: GRAY_STAINED_GLASS_PANE
